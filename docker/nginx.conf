# Редирект HTTP → HTTPS
server {
    listen 80;
    server_name konoq-hostel.com www.konoq-hostel.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Основной HTTPS-сервер
server {
    listen 443 ssl;
    server_name konoq-hostel.com www.konoq-hostel.com;

    # SSL сертификаты от Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/konoq-hostel.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/konoq-hostel.com/privkey.pem;

    # Рекомендуемые SSL-параметры
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       10m;

    client_max_body_size 20M;

    # Фронтенд — React SPA
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;  # SPA: все роуты → index.html
    }

    # Бэкенд API → Gunicorn
    location /api/ {
        proxy_pass         http://web:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Django static (admin, swagger) — отдельный префикс чтобы не конфликтовать с React /static/
    location /django-static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
